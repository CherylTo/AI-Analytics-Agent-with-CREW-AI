manager_task:
  agent: manager
  description: >
    A user has asked the following question about the business data:

    "{question}"

    Interpret this question and produce a structured query plan that the SQL Generator
    can use to write a DuckDB SQL query. The query plan must include a restated version 
    of the question, a plain English description of the SQL intent, any filters or 
    conditions, groupings an daggregations required, and the expected output columns.
  expected_output: >
    A structured QueryPlan object containing question, sql_intent, filters, grouping,
    and expected_output_columns.

sql_task:
  agent: sql_generator
  description: >
    Using the query plan provided, write a single valid DuckDB SQL query against
    the analytics_orders view.

    The analytics_orders view has the following schema:

    | column_name                   | type      |
    |-------------------------------|-----------|
    | order_id                      | VARCHAR   |
    | order_purchase_timestamp      | TIMESTAMP |
    | purchase_month                | DATE      |
    | order_status                  | VARCHAR   |
    | customer_id                   | VARCHAR   |
    | customer_state                | VARCHAR   |
    | product_id                    | VARCHAR   |
    | product_category_name_english | VARCHAR   |
    | seller_id                     | VARCHAR   |
    | price                         | DOUBLE    |
    | freight_value                 | DOUBLE    |
    | order_item_value              | DOUBLE    |
    | payment_type                  | VARCHAR   |
    | payment_value                 | DOUBLE    |
    | review_score                  | BIGINT    |
    | delivery_days                 | BIGINT    |

    Rules:
    - Use only the columns listed above — never hallucinate column names
    - Query only the analytics_orders view
    - Return raw SQL only — no markdown, no code fences, no explanation
    - Always include LIMIT 20 unless the query plan explicitly requires all rows
    - Always apply ORDER BY before LIMIT — never apply LIMIT before sorting
    - If the question asks for "most", "highest", "top", or "largest", ORDER BY the metric column DESC
    - If the question asks for "least", "lowest", "bottom", or "smallest", ORDER BY the metric column ASC
    - If no ordering is implied, ORDER BY the last column in the SELECT statement DESC by default
    - Exception: if the query groups or orders by a date or time column 
      (purchase_month, order_purchase_timestamp), always ORDER BY that column ASC 
      to show chronological order
  expected_output: >
    A single valid DuckDB SQL query string and nothing else.
  context:
    - manager_task

sql_validation_task:
  agent: manager
  description: >
    Review the SQL query generated by the SQL Generator and determine if it is
    valid and correctly reflects the query plan.

    The user's original question was:

    "{question}"

    Validate the following:
    - The SQL query only references columns that exist in the analytics_orders schema
    - The SQL intent matches the original query plan
    - The query includes LIMIT 30 unless all rows are explicitly required
    - The output contains raw SQL only — no markdown, code fences, or explanation

    If all checks pass, approve the query.
    If any check fails, reject it with specific feedback so the SQL Generator
    can correct it. You must re-delegate to the SQL Generator with the feedback
    as explicit instructions for what to correct. Do not proceed to the next
    task until the output is approved.
  expected_output: >
    A structured ValidationResult object with approved set to true or false,
    and feedback explaining what needs to be fixed if rejected.
  context:
    - manager_task
    - sql_task

visualization_task:
  agent: visualizer
  description: >
    The user's original question was:

    "{question}"

    Using the SQL query results provided, select the most appropriate Plotly Express
    chart type to visualize the data and produce structured chart metadata.

    The query results are provided below:

    {dataframe}

    Rules:
    - Select the most appropriate chart type: bar, line, pie, scatter, histogram, box, or area
    - x_field and y_field must exactly match column names from the SQL results
    - The chart title should reflect the user's original question
    - A data table must always be shown alongside the chart — set table_enabled to true
    - Do not include a color scheme — that is managed globally by the application
    - Data is already aggregated — do not suggest further grouping or aggregation
    - Never render the chart yourself — output metadata only
  expected_output: >
    A structured ChartMetadata object containing chart_type, title, x_field,
    y_field, and table_enabled.
  context:
    - manager_task
    - sql_task

chart_validation_task:
  agent: manager
  description: >
    Review the chart metadata generated by the Visualization Analyst and determine
    if it correctly represents the query results.

    The user's original question was:

    "{question}"

    Validate the following:
    - The chart type is appropriate for the shape of the data
    - x_field and y_field exactly match column names from the SQL results
    - The chart title reflects the user's original question
    - table_enabled is set to true

    If all checks pass, approve the metadata.
    If any check fails, reject it with specific feedback so the Visualizer
    can correct it. You must re-delegate to the SQL Generator with the feedback
    as explicit instructions for what to correct. Do not proceed to the next
    task until the output is approved.
  expected_output: >
    A structured ValidationResult object with approved set to true or false,
    and feedback explaining what needs to be fixed if rejected.
  context:
    - sql_task
    - visualization_task

insight_task:
  agent: insight_generator
  description: >
    The user's original question was:

    "{question}"

    Using the SQL query results and chart metadata provided, produce a concise
    structured business insight that summarizes the findings, highlights the key
    takeaway, and flags any anomalies or outliers if genuinely present.

    The query results are provided below: {dataframe}

    CRITICAL: The data has been provided to you directly in the context. You must
    base your entire response on this data only. Do not use any external knowledge,
    do not rename values, do not translate abbreviations, do not substitute
    real-world knowledge for what is in the data.

    If the data shows "SP", write "SP". If it shows "RJ", write "RJ".
    Never replace data values with country names, state names, or any other
    interpretation. The data is ground truth — treat it as absolute.

    Rules:
    - Summary must be 2-3 sentences maximum
    - Key takeaway must be a single punchy sentence a non-technical user can act on
    - Only populate anomalies if something genuinely stands out in the data — do not
      invent outliers if the data is uniform
    - Write in plain English but never substitute or rename values from the data —
      report states, categories, and identifiers exactly as they appear in the results.
    - Base insights only on the data provided — do not make assumptions beyond it
    - If the data is empty or contains no rows, set summary to "No data was returned
      for this question." and key_takeaway to "Try rephrasing the question or check
      that the data exists." — do not invent findings from empty results
    - Never interpret, translate, or expand field values — use them exactly as they
      appear in the data. For example if the data shows "SP", say "SP" not "São Paulo"
      or any other interpretation.
  expected_output: >
    A structured InsightOutput object containing summary, key_takeaway, and
    an optional anomalies field.
  context:
    - manager_task
    - sql_task
    - visualization_task
    - chart_validation_task

streamlit_task:
  agent: streamlit_developer
  description: >
    Generate or update the Streamlit application for the Agent Analytics project.
    The app file lives at Version2/streamlit/app.py.

    If the file already exists, read it first and update it while preserving
    any working functionality. If it does not exist, create it from scratch.

    The app must include the following:

    Tab 1 - Overview:
    - Project description and dataset context
    - Key metrics (orders, customers, sellers, categories)
    - Data model showing analytics_orders columns grouped by dimension and fact
    - How it works section explaining the 4 agents

    Tab 2 - Ask a Question:
    - Text input for the user to type a custom question
    - Preloaded questions dropdown grouped by category:

      Sales & Revenue:
        What are total sales by month?
        Which product categories generate the most revenue?
        What is the average order value by state?
        What is the total freight value vs product value by category?
        Which payment types are most commonly used?

      Orders & Volume:
        How many orders were placed per month?
        What is the order status breakdown?
        Which states have the most orders?
        How many unique customers placed orders?

      Products & Categories:
        Which product categories have the highest average review score?
        What are the top 10 selling product categories by volume?
        Which categories have the highest freight cost relative to price?

      Sellers:
        Which sellers have the highest total sales?
        Which sellers have the best average review scores?
        How many unique sellers are there per state?

      Delivery & Experience:
        What is the average delivery time by state?
        Which states have the longest delivery times?
        Is there a correlation between delivery days and review score?
        Which product categories have the slowest delivery?

      Payments:
        What is the average payment value by payment type?
        How does payment type vary by state?

    - Analyze button that triggers the crew
    - Sidebar showing agent status (Manager, SQL Generator, Visualizer, Insight Analyst)
    - Sidebar showing SQL inspector with the generated query
    - Chart output using Plotly Express
    - Data table below the chart
    - Insight box showing summary, key takeaway, and anomalies if present

    Styling:
    - Dark theme throughout
    - Plotly charts styled to match the dark theme
    - Color palette managed globally — do not hardcode colors inline

    Output the complete Python file contents only — no explanation, no markdown
    code fences, no preamble. The first character must be a valid Python statement.
  expected_output: >
    A complete, fully runnable Streamlit Python app as a single file string.
    No markdown, no code fences, no explanation — raw Python only.
